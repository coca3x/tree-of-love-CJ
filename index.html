<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Árbol de Amor para Carolina</title>
  <!-- Metadatos -->
  <meta name="author" content="EduardoX">
  <meta name="copyright" content="EduardoX">
  <meta name="description"
    content="Árbol de Amor Animado: una sorpresa interactiva y romántica para dedicar a tu pareja o ser querido.">
  <meta name="keywords"
    content="amor, sorpresa, romántico, dedicatoria, animación, árbol, corazones, pareja, aniversario, regalo digital">
  <meta name="robots" content="index, follow">

  <!-- Hojas de estilo -->
  <link rel="stylesheet" href="Css/style.css">
  <link rel="stylesheet" href="Css/style.mobile.css" media="only screen and (max-width: 600px)">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;500&display=swap&display=swap"
    rel="stylesheet">
  <style>
    /* Animación de latido para corazones */
    .animated-heart {
      transform-origin: center;
      animation: beat 1s infinite;
    }

    @keyframes beat {

      0%,
      100% {
        transform: scale(1);
      }

      20% {
        transform: scale(1.1);
      }

      40% {
        transform: scale(0.95);
      }

      60% {
        transform: scale(1.08);
      }

      80% {
        transform: scale(1);
      }
    }
  </style>
</head>

<body>
  <!-- Intro de nombre animada -->
  <div id="name-intro" class="name-intro">
    <div class="name-container-intro">
      <div class="name-text-intro">Licda. Carolina</div>
      <div class="name-hearts-intro" id="intro-hearts"></div>
    </div>
  </div>

  <!-- Header permanente -->
  <header class="main-header" id="main-header">
    <div class="name-container">
      <div class="name-text">Licda. Carolina</div>
      <div class="name-hearts" id="header-hearts"></div>
    </div>
  </header>

  <!-- Contenedores principales -->
  <div id="floating-objects"></div>
  <div class="dedication-text" id="dedication-text">
    <div class="signature" id="signature"></div>
  </div>
  <div class="countdown" id="countdown"></div>
  <div class="tree-container" id="tree-container"></div>

  <!-- Recursos multimedia -->
  <audio src="Music/No%2E5%20The%20Day%20I%20Met%20Her%20-%20Esther%20Abrami.mp3" id="bg-music" preload="auto"></audio>

  <!-- Scripts -->
  <script src="Js/script.js"></script>
</body>

</html>
